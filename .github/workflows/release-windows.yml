name: Release (Windows)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v1.7.0)'
        required: true
      release_name:
        description: 'Release name (e.g. Mumble 1.7.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        required: true
        type: boolean
        default: false

env:
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=ON -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

jobs:
  fetch_build_number:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_number: ${{ steps.fetch.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: fetch
        shell: bash
        run: |
          build_version="$("${{ github.workspace }}/scripts/mumble-version.py")"
          build_number="$("${{ github.workspace }}/scripts/mumble-build-number.py" \
            --commit "${{ github.sha }}" --version "${build_version}" \
            --password "${{ secrets.BUILD_NUMBER_TOKEN }}" --default 0)"
          echo "Build Number: ${build_version}.${build_number}"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"

  build_windows:
    needs: [ fetch_build_number ]
    runs-on: windows-2025-vs2026
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Set environment variables
        run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "windows-2025-vs2026" "static" "x86_64" "${{ github.workspace }}"
        shell: bash

      - uses: actions/cache/restore@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-windows.windows-2025-vs2026.static
          save: true
          append-timestamp: false

      - uses: ./.github/actions/install-dependencies
        with:
          type: static
          os: windows-2025-vs2026
          arch: x86_64

      - name: Build
        run: ./.github/workflows/build.sh "windows-2025-vs2026" "static" "x86_64"
        shell: bash
        env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}

      - name: Test
        working-directory: ${{ github.workspace }}/build
        shell: bash
        run: ctest --output-on-failure -C $BUILD_TYPE

      - uses: actions/cache/save@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - name: Upload Windows installers
        uses: actions/upload-artifact@v6
        with:
          name: windows-installers
          compression-level: 9
          path: |
            build/**/mumble*.msi
            build/**/mumble*.exe

  create_release:
    needs: [ build_windows ]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Windows installers
        uses: actions/download-artifact@v6
        with:
          name: windows-installers
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: ${{ github.event.inputs.release_name }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: artifacts/**
          generate_release_notes: true
